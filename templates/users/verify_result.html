<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Verification</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#f4f6f8;margin:0;padding:0}
    .card{max-width:680px;margin:48px auto;background:#fff;border-radius:8px;box-shadow:0 8px 24px rgba(11,22,37,0.06);overflow:hidden}
    .body{padding:24px}
    .title{font-size:20px;margin:0 0 8px}
    .muted{color:#6b7280}
    .btn{display:inline-block;padding:10px 14px;background:#0b74ff;color:#fff;border-radius:6px;text-decoration:none}
    .count{font-weight:700}
    @media(max-width:480px){.card{margin:12px}}
  </style>
</head>
<body>
  <div class="card">
    <div class="body">
      <h1 class="title">Verification status</h1>
      <p id="message">{{ message }}</p>
      <p class="muted">You will be redirected in <span id="count">{{ countdown|default:6 }}</span>s — or click the button below to continue now.</p>
      <p><a id="continueBtn" class="btn" href="{{ redirect_to }}">Continue</a></p>
    </div>
  </div>
  <script>
    (function(){
      var s = parseInt(document.getElementById('count').textContent||'6',10);
      var btn = document.getElementById('continueBtn');
      var tid = setInterval(function(){
        s--; if(s<=0){ clearInterval(tid); window.location = btn.href; } else { document.getElementById('count').textContent = s; }
      },1000);
    })();
  </script>
</body>
</html>
