{% extends 'emails/base_email.html' %}

{% block content %}
<p>Hi {{ user.get_full_name|default:user.username }},</p>

<p>Your store "{{ store.name }}" received a new review:</p>
<blockquote>
  <p>Rating: {{ review.rating }} / 5</p>
  <p>{{ review.comment }}</p>
</blockquote>

<p>View your store: <a href="{{ site_url }}{% url 'storefront:store_detail' store.slug %}">View Store</a></p>

<p>Thanks,<br/>Baysoko</p>
{% endblock %}
