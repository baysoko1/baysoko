{# Modern floating chat widget – with polished suggestion cards #}
<div data-agent-widget data-agent-user-id="{{ request.user.id|default:'' }}" data-agent-user-first-name="{{ request.user.first_name|default:'' }}" data-agent-username="{{ request.user.username|default:'' }}" class="agent-widget-floating" aria-hidden="false">
  <button type="button" class="agent-toggle" aria-label="Open AI Assistant" aria-expanded="false">
    <span class="agent-icon" aria-hidden="true">🤖</span>
    <span class="agent-unread" data-agent-unread hidden>·</span>
  </button>

  <div class="agent-panel" role="dialog" aria-hidden="true" aria-label="Baysoko Assistant">
    <div class="agent-header">
      <div class="agent-title">Baysoko Assistant</div>
      <div class="agent-controls">
        <button type="button" class="agent-minimize" aria-label="Minimize">_</button>
        <button type="button" class="agent-close" aria-label="Close">✕</button>
      </div>
    </div>

    <div class="agent-messages-wrap">
      <div class="agent-messages" data-agent-messages aria-live="polite"></div>
      <div class="agent-typing" data-agent-typing hidden aria-hidden="true">
        <div class="typing-dots"><span></span><span></span><span></span></div>
        <span class="typing-text">Assistant is typing...</span>
      </div>
    </div>

    <div class="agent-input-area">
      <div class="agent-autofill-toggle-wrap" data-agent-autofill-wrap hidden>
        <label class="agent-autofill-toggle">
          <input type="checkbox" data-agent-autofill-toggle>
          <span class="agent-toggle-slider" aria-hidden="true"></span>
          <span class="agent-toggle-label">Auto-fill listing fields from title</span>
        </label>
      </div>
      <textarea data-agent-input class="form-control" rows="1" placeholder="Ask the assistant..."></textarea>
      <div class="agent-actions">
        <button type="button" data-agent-send class="btn btn-primary">Send</button>
      </div>
    </div>
  </div>
</div>

<style>
/* ===== INBOX‑INSPIRED VARIABLES ===== */
.agent-widget-floating {
  --primary: #FF6B35;
  --primary-dark: #E55A2B;
  --accent: #06D6A0;
  --accent-2: #118AB2;
  --shadow: 0 12px 36px rgba(0,0,0,.12);
  --radius-lg: 12px;
  --radius-md: 8px;
  --radius-sm: 4px;
  --transition: all 0.2s ease;
}

/* ===== WIDGET CONTAINER ===== */
.agent-widget-floating {
  position: fixed;
  right: 18px;
  bottom: calc(40px + env(safe-area-inset-bottom, 0));
  z-index: 12000;
  font-family: inherit;
}

/* ===== TOGGLE BUTTON ===== */
.agent-widget-floating .agent-toggle {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--primary);
  border: none;
  color: #fff;
  font-size: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow);
  cursor: pointer;
  position: relative;
  transition: var(--transition);
  bottom: 40px;
  transform: translateY(0) scale(1);
  opacity: 1;
}
.agent-widget-floating .agent-toggle:hover {
  background: var(--primary-dark);
  transform: scale(1.05);
}
.agent-widget-floating.scroll-hidden .agent-toggle {
  transform: translateY(120px) scale(0.85);
  opacity: 0;
  pointer-events: none;
}
.agent-unread {
  position: absolute;
  right: 8px;
  top: 8px;
  background: #EF476F;
  color: white;
  border-radius: 50%;
  width: 12px;
  height: 12px;
  font-size: 0;
  line-height: 0;
}
.agent-unread::before {
  content: '';
  display: block;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: #EF476F;
}

/* ===== PANEL (closed by default) ===== */
.agent-widget-floating .agent-panel {
  display: none;
  width: 360px;
  max-width: calc(100vw - 36px);
  height: min(72vh, 720px);
  background: var(--bg-primary);
  box-shadow: var(--shadow);
  border-radius: var(--radius-lg);
  overflow: hidden;
  flex-direction: column;
  border: 1px solid var(--border-color);
}
.agent-widget-floating.open .agent-panel {
  display: flex;
}
/* Hide the floating toggle button when panel is open to avoid duplicate controls */
.agent-widget-floating.open .agent-toggle {
  display: none;
}

/* ===== HEADER ===== */
.agent-panel .agent-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.75rem 1rem;
  background: linear-gradient(90deg, var(--primary), var(--accent-2));
  color: white;
}
.agent-panel .agent-title {
  font-weight: 600;
  font-size: 1rem;
}
.agent-panel .agent-controls button {
  background: transparent;
  border: none;
  color: inherit;
  font-size: 1rem;
  margin-left: 0.5rem;
  cursor: pointer;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}
.agent-panel .agent-controls button:hover {
  background: rgba(255,255,255,0.2);
}

/* ===== MESSAGES AREA ===== */
.agent-messages-wrap {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  background: var(--bg-secondary);
  padding: 0.5rem;
}
.agent-messages {
  overflow-y: auto;
  padding: 0.25rem 0.25rem 0.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  scrollbar-width: thin;
  scrollbar-color: var(--border-color) transparent;
}
.agent-messages::-webkit-scrollbar {
  width: 4px;
}
.agent-messages::-webkit-scrollbar-track {
  background: transparent;
}
.agent-messages::-webkit-scrollbar-thumb {
  background: var(--border-color);
  border-radius: 4px;
}
.agent-history-loading {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  align-self: center;
  margin: 8px auto;
  padding: 6px 12px;
  border-radius: 999px;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  font-size: 0.8rem;
}
.agent-history-spinner {
  width: 14px;
  height: 14px;
  border: 2px solid var(--border-color);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: agent-spin 0.8s linear infinite;
}
@keyframes agent-spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ===== MESSAGE BUBBLES ===== */
.agent-msg {
  max-width: 82%;
  padding: 0.6rem 0.9rem;
  border-radius: 18px;
  line-height: 1.4;
  word-wrap: break-word;
  font-size: 0.95rem;
  position: relative;
}
.agent-msg.user {
  align-self: flex-end;
  background: var(--primary);
  color: white;
  border-bottom-right-radius: 4px;
}
.agent-msg.user.failed {
  outline: 1px solid rgba(239,71,111,0.6);
}
.agent-msg.bot {
  align-self: flex-start;
  background: var(--bg-primary);
  color: var(--text-primary);
  border: 1px solid var(--border-color);
  border-bottom-left-radius: 4px;
}
.agent-msg.bot.msg-enter {
  animation: agent-msg-enter 0.34s cubic-bezier(.22,.9,.22,1);
  transform-origin: left bottom;
}
@keyframes agent-msg-enter {
  0% {
    opacity: 0;
    transform: translateY(10px) scale(0.98);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}
.agent-msg-content {
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: break-word;
}
.agent-retry-badge {
  position: absolute;
  left: -96px;
  top: 50%;
  transform: translateY(-50%);
  border: 1px solid #ef476f;
  background: #ef476f;
  color: #fff;
  border-radius: 999px;
  padding: 4px 10px;
  font-size: 0.72rem;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(239,71,111,0.25);
}
.agent-retry-badge:hover {
  background: #d73860;
  border-color: #d73860;
}
.agent-desc {
  display: grid;
  gap: 6px;
}
.agent-formatted-paragraph {
  margin: 0;
  line-height: 1.5;
}
.agent-inline-link {
  color: var(--primary);
  text-decoration: underline;
  text-underline-offset: 2px;
  font-weight: 600;
  word-break: break-all;
}
.agent-inline-link:hover {
  color: var(--primary-dark);
}
.agent-formatted-list {
  margin: 0;
  padding-left: 18px;
}
.agent-formatted-list li + li {
  margin-top: 4px;
}
.agent-msg-ts {
  font-size: 0.65rem;
  margin-top: 4px;
  opacity: 0.7;
  text-align: right;
}
.agent-msg.user .agent-msg-ts {
  color: rgba(255,255,255,0.8);
}
.agent-msg.bot .agent-msg-ts {
  color: var(--text-tertiary);
}

/* ===== BOT MESSAGE ACTIONS (copy, like, dislike) ===== */
.agent-msg.bot {
  position: relative;
}
.agent-message-actions {
  display: flex;
  gap: 4px;
  margin-top: 6px;
  justify-content: flex-end;
}
.agent-action-btn {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 2px 8px;
  font-size: 0.75rem;
  cursor: pointer;
  color: var(--text-secondary);
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 2px;
}
.agent-action-btn:hover {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}
.agent-action-btn.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}
.agent-action-btn i {
  font-size: 0.8rem;
}

/* ===== TYPING INDICATOR ===== */
.agent-typing {
  padding: 0.4rem 0.6rem;
  color: var(--text-secondary);
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.agent-typing .typing-dots {
  display: flex;
  gap: 4px;
}
.agent-typing .typing-dots span {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-tertiary);
  animation: typingBounce 1.4s infinite ease-in-out;
}
.agent-typing .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
.agent-typing .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
.agent-typing .typing-dots span:nth-child(3) { animation-delay: 0s; }
@keyframes typingBounce {
  0%,80%,100% { transform: scale(0.8); opacity: 0.5; }
  40% { transform: scale(1); opacity: 1; }
}

/* ===== INPUT AREA ===== */
.agent-input-area {
  padding: 0.75rem;
  border-top: 1px solid var(--border-color);
  background: var(--bg-primary);
  display: flex;
  gap: 0.5rem;
  align-items: flex-end;
}
.agent-input-area textarea.form-control {
  flex: 1;
  resize: none;
  padding: 0.6rem 0.8rem;
  border-radius: 20px;
  border: 1px solid var(--border-color);
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-size: 0.95rem;
  line-height: 1.4;
  max-height: 120px;
  transition: var(--transition);
}
.agent-input-area textarea.form-control:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
  background: var(--bg-primary);
}
.agent-actions {
  display: flex;
  gap: 0.4rem;
}
.agent-actions .btn {
  height: 38px;
  padding: 0.25rem 0.8rem;
  border-radius: 20px;
  border: none;
  font-size: 0.9rem;
  cursor: pointer;
  transition: var(--transition);
}
.btn-primary {
  background: var(--primary);
  color: white;
}
.btn-primary:hover {
  background: var(--primary-dark);
}
.btn-outline-secondary {
  background: transparent;
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
}
.btn-outline-secondary:hover {
  background: var(--bg-secondary);
  color: var(--text-primary);
}

.agent-suggestions {
  margin-top: 8px;
  border-top: 1px dashed var(--border-color);
  padding-top: 8px;
}
.agent-suggestions strong {
  font-size: 0.85rem;
  color: var(--text-secondary);
  display: block;
  margin-bottom: 8px;
}
/* Pills layout: compact, responsive, max 3 visible inside bubble */
.agent-suggestion-pills {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.agent-suggestion-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: 999px;
  min-height: 40px;
  max-width: 100%;
  overflow: hidden;
  white-space: normal;
  cursor: pointer;
}
.agent-autofill-toggle-wrap {
  margin-bottom: 8px;
}
.agent-autofill-toggle {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.agent-autofill-toggle input {
  display: none;
}
.agent-toggle-slider {
  width: 38px;
  height: 22px;
  border-radius: 999px;
  border: 1px solid var(--border-color);
  background: var(--bg-secondary);
  position: relative;
  transition: var(--transition);
}
.agent-toggle-slider::after {
  content: '';
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #fff;
  position: absolute;
  top: 2px;
  left: 2px;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
  transition: var(--transition);
}
.agent-autofill-toggle input:checked + .agent-toggle-slider {
  background: var(--primary);
  border-color: var(--primary);
}
.agent-autofill-toggle input:checked + .agent-toggle-slider::after {
  transform: translateX(16px);
}
.agent-toggle-label {
  font-size: 0.8rem;
  color: var(--text-secondary);
}
.agent-suggestion-pill img {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
  border: 1px solid var(--border-color);
}
.agent-suggestion-pill .pill-title {
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--text-primary);
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.agent-suggestion-pill .pill-content {
  display: grid;
  gap: 2px;
  min-width: 0;
}
.agent-suggestion-pill .pill-reason {
  font-size: 0.75rem;
  color: var(--text-secondary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.agent-suggestion-pill.view-more {
  background: rgba(255,107,53,0.08);
  color: var(--primary);
  border-color: rgba(255,107,53,0.12);
}
.agent-suggestion-meta span {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--bg-primary);
  padding: 2px 8px;
  border-radius: 12px;
  border: 1px solid var(--border-color);
  white-space: nowrap;
}
.agent-suggestion-meta span i {
  font-size: 0.75rem;
  color: var(--text-tertiary);
}
.agent-suggestion-price {
  font-weight: 700;
  color: var(--primary);
  background: rgba(255,107,53,0.1) !important;
  border-color: var(--primary) !important;
}
.agent-suggestion-actions {
  display: flex;
  gap: 6px;
  margin-left: auto;
  flex-shrink: 0;
  align-items: center;
}
.agent-action-link,
.agent-action-add {
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 0.75rem;
  cursor: pointer;
  transition: var(--transition);
  text-decoration: none;
  color: var(--text-primary);
  white-space: nowrap;
  font-weight: 500;
}
.agent-action-add {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}
.agent-action-add:hover {
  background: var(--primary-dark);
}
.agent-action-link:hover {
  background: var(--bg-secondary);
  border-color: var(--text-secondary);
}
/* Badge for premium stores */
.badge.premium {
  background: var(--accent);
  color: white;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  display: inline-block;
  margin-left: 6px;
}

/* ===== APPLY MODAL ===== */
.agent-apply-modal {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%,-50%);
  z-index: 999999;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  padding: 16px;
  box-shadow: var(--shadow);
  border-radius: var(--radius-lg);
  display: none;
  max-width: 400px;
  width: 90%;
}
.agent-apply-preview {
  max-height: 240px;
  overflow: auto;
  margin-bottom: 12px;
  font-size: 0.9rem;
}
.agent-apply-preview ul {
  margin: 4px 0;
  padding-left: 20px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 420px) {
  .agent-widget-floating {
    right: 12px;
    left: 12px;
    bottom: 40px;
  }
  .agent-panel {
    width: 100%;
    max-width: 100%;
    border-radius: 10px;
  }
  .agent-msg {
    max-width: 92%;
  }
  .agent-suggestions li {
    flex-wrap: wrap;
  }
  .agent-suggestion-pills {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }
  .agent-suggestion-pill {
    width: 100%;
    border-radius: 12px;
  }
  .agent-suggestion-actions {
    margin-left: 0;
    width: 100%;
    justify-content: flex-end;
  }
  .agent-suggestion-image {
    width: 60px;
    height: 60px;
  }
  .agent-suggestion-meta span {
    white-space: normal;
    word-break: break-word;
  }
  .agent-retry-badge {
    left: auto;
    right: -6px;
    top: -10px;
    transform: none;
  }
}
</style>
